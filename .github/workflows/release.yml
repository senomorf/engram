name: release

# Tag-driven signed-APK release (design D24). Push a tag vX.Y.Z to build, sign, and
# publish the APK to GitHub Releases; a hyphen suffix (vX.Y.Z-rc1) marks a prerelease so
# the whole pipeline can be trialed before a real release.
on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write # create the GitHub Release
  id-token: write # provenance attestation
  attestations: write # provenance attestation

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v6

      - name: Derive version from tag
        id: ver
        run: |
          TAG="${GITHUB_REF_NAME}"
          VER="${TAG#v}"
          CORE="${VER%%-*}" # drop any -rc1 suffix for the numeric code
          IFS=. read -r MAJ MIN PAT <<< "$CORE"
          CODE=$(( 10#$MAJ * 1000000 + 10#$MIN * 1000 + 10#$PAT )) # 10# forces base-10 (avoid octal on 0-padded parts)
          echo "name=$VER" >> "$GITHUB_OUTPUT"
          echo "code=$CODE" >> "$GITHUB_OUTPUT"
          if [[ "$TAG" == *-* ]]; then echo "prerelease=true" >> "$GITHUB_OUTPUT"; else echo "prerelease=false" >> "$GITHUB_OUTPUT"; fi
          echo "version=$VER code=$CODE tag=$TAG"

      - name: Decode signing keystore
        env:
          ENGRAM_KEYSTORE_BASE64: ${{ secrets.ENGRAM_KEYSTORE_BASE64 }}
        run: echo "$ENGRAM_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/engram.jks"

      - name: Build signed release APK
        env:
          ENGRAM_KEYSTORE_FILE: ${{ runner.temp }}/engram.jks
          ENGRAM_KEYSTORE_PASSWORD: ${{ secrets.ENGRAM_KEYSTORE_PASSWORD }}
          ENGRAM_KEY_ALIAS: ${{ secrets.ENGRAM_KEY_ALIAS }}
          ENGRAM_KEY_PASSWORD: ${{ secrets.ENGRAM_KEY_PASSWORD }}
        run: >
          ./gradlew :app:assembleRelease
          -PengramVersionName=${{ steps.ver.outputs.name }}
          -PengramVersionCode=${{ steps.ver.outputs.code }}
          --console=plain

      - name: Stage, verify signature, checksum
        run: |
          cp app/build/outputs/apk/release/app-release.apk engram.apk
          APKSIGNER="$(ls "$ANDROID_HOME"/build-tools/*/apksigner | sort -V | tail -n1)"
          "$APKSIGNER" verify --print-certs engram.apk
          sha256sum engram.apk > engram.apk.sha256
          cat engram.apk.sha256

      # Boot the actual signed artifact on an emulator and assert it launches without
      # crashing; a failure here blocks the release (the publish step below is skipped).
      - name: Smoke-test the signed APK on an emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: aosp_atd
          disable-animations: true
          script: |
            adb install -r engram.apk
            adb logcat -c
            adb shell monkey -p cam.engram.app -c android.intent.category.LAUNCHER 1 || true
            sleep 5
            adb logcat -d > logcat.txt
            if grep -E "FATAL EXCEPTION|ANR in cam.engram.app" logcat.txt; then
              echo "::error::release APK crashed on launch"; tail -60 logcat.txt; exit 1
            fi
            adb shell pidof cam.engram.app >/dev/null || { echo "::error::app not running after launch"; tail -60 logcat.txt; exit 1; }
            echo "smoke ok: cam.engram.app launched without crash"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: engram.apk

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          VER="${{ steps.ver.outputs.name }}"
          awk -v v="$VER" '
            $0 ~ "^## \\[" v "\\]" { f = 1; next }
            f && /^## \[/ { exit }
            f { print }
          ' CHANGELOG.md > notes.md || true
          if [ -s notes.md ]; then echo "have_notes=true" >> "$GITHUB_OUTPUT"; else echo "have_notes=false" >> "$GITHUB_OUTPUT"; fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ARGS=()
          [ "${{ steps.ver.outputs.prerelease }}" = "true" ] && ARGS+=(--prerelease)
          if [ "${{ steps.notes.outputs.have_notes }}" = "true" ]; then
            ARGS+=(--notes-file notes.md)
          else
            ARGS+=(--generate-notes)
          fi
          gh release create "${GITHUB_REF_NAME}" engram.apk engram.apk.sha256 \
            --title "Engram ${{ steps.ver.outputs.name }}" "${ARGS[@]}"
