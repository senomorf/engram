name: release

# Tag-driven signed-APK release (design D24). Push a tag vX.Y.Z to build, sign, and
# publish the APK to GitHub Releases; a hyphen suffix (vX.Y.Z-rc1) marks a prerelease so
# the whole pipeline can be trialed before a real release.
on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write # create the GitHub Release
  id-token: write # provenance attestation
  attestations: write # provenance attestation

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Gate the signing job on the tag SHA's full build/tests/coverage, plus (for a stable tag) that
  # it is merged to main and the release evidence is recorded. No secrets here, so it runs before
  # the environment approval; the release job needs it (finding F7).
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read # gate job: only reads history and builds, never writes or signs
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0 # full history so the ancestry check can walk to origin/main
      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-kotlin-2.3.21
      - name: Derive version from tag
        id: ver
        run: bash scripts/derive-version.sh "$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"
      # a stable tag must sit on a commit already merged to main (and so already through main's ci
      # + instrumented run); rc tags are exempt so the pipeline can be trialed on any commit
      - name: Require the tag be reachable from main (stable only)
        if: steps.ver.outputs.prerelease == 'false'
        run: |
          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" FETCH_HEAD; then
            echo "::error::tag $GITHUB_REF_NAME ($GITHUB_SHA) is not reachable from origin/main; refusing to release an unmerged commit" >&2
            exit 1
          fi
      # the survivability matrix and device-QA pass are the documented v1 release gate; a stable
      # tag must not publish before they are recorded (rc tags exempt)
      - name: Require survivability and device-QA evidence (stable only)
        if: steps.ver.outputs.prerelease == 'false'
        run: bash scripts/check-release-evidence.sh
      - name: Full build, tests, coverage, iOS tripwire
        run: ./gradlew build koverVerifyAggregate :core-format:compileKotlinIosArm64 --console=plain

  release:
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # owner-configured approval gate for the signing secrets (design D24). GitHub creates the
    # environment on first run; set required reviewers in repo Settings > Environments > release.
    environment: release
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6

      - name: Derive version from tag
        id: ver
        # validate the tag and derive the version in a script that fails closed on a tag
        # carrying shell metacharacters (release-tag injection); the outputs below are data
        run: bash scripts/derive-version.sh "$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"

      - name: Decode signing keystore
        env:
          ENGRAM_KEYSTORE_BASE64: ${{ secrets.ENGRAM_KEYSTORE_BASE64 }}
        run: echo "$ENGRAM_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/engram.jks"

      - name: Build signed release APK
        env:
          ENGRAM_KEYSTORE_FILE: ${{ runner.temp }}/engram.jks
          ENGRAM_KEYSTORE_PASSWORD: ${{ secrets.ENGRAM_KEYSTORE_PASSWORD }}
          ENGRAM_KEY_ALIAS: ${{ secrets.ENGRAM_KEY_ALIAS }}
          ENGRAM_KEY_PASSWORD: ${{ secrets.ENGRAM_KEY_PASSWORD }}
          # version reaches gradle as quoted env, never expanded into the run: line
          VERSION_NAME: ${{ steps.ver.outputs.name }}
          VERSION_CODE: ${{ steps.ver.outputs.code }}
        run: >
          ./gradlew :app:assembleRelease
          -PengramVersionName="$VERSION_NAME"
          -PengramVersionCode="$VERSION_CODE"
          --console=plain

      - name: Stage, verify signature, checksum
        run: |
          cp app/build/outputs/apk/release/app-release.apk engram.apk
          APKSIGNER="$(printf '%s\n' "$ANDROID_HOME"/build-tools/*/apksigner | sort -V | tail -n1)"
          "$APKSIGNER" verify --print-certs engram.apk
          sha256sum engram.apk > engram.apk.sha256
          cat engram.apk.sha256

      # Boot the actual signed artifact on an emulator and assert it launches without
      # crashing; a failure here blocks the release (the publish step below is skipped).
      # Emulator boot is occasionally flaky on hosted runners, so use a generous boot
      # timeout with stabilizing options and allow one retry (the action has no native retry).
      - name: Smoke-test the signed APK on an emulator
        id: smoke
        continue-on-error: true
        uses: reactivecircus/android-emulator-runner@a421e43855164a8197daf9d8d40fe71c6996bb0d # v2
        with:
          api-level: 34
          arch: x86_64
          target: aosp_atd
          disable-animations: true
          emulator-boot-timeout: 900
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none -camera-front none
          # the action runs `script` line by line, so keep the logic in a file bash parses whole
          script: bash scripts/smoke-apk.sh engram.apk

      - name: Retry the emulator smoke test once
        if: steps.smoke.outcome == 'failure'
        uses: reactivecircus/android-emulator-runner@a421e43855164a8197daf9d8d40fe71c6996bb0d # v2
        with:
          api-level: 34
          arch: x86_64
          target: aosp_atd
          disable-animations: true
          emulator-boot-timeout: 900
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none -camera-front none
          script: bash scripts/smoke-apk.sh engram.apk

      - name: Attest build provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: engram.apk

      - name: Extract release notes from CHANGELOG
        id: notes
        env:
          VERSION_CORE: ${{ steps.ver.outputs.core }}
        run: |
          # the CHANGELOG heading is always the base X.Y.Z (promoted before an rc trial,
          # AGENTS Releasing), so rc tags must look up the core version, not the full name
          VER="$VERSION_CORE"
          awk -v v="$VER" '
            $0 ~ "^## \\[" v "\\]" { f = 1; next }
            f && /^## \[/ { exit }
            f { print }
          ' CHANGELOG.md > notes.md || true
          if [ -s notes.md ]; then echo "have_notes=true" >> "$GITHUB_OUTPUT"; else echo "have_notes=false" >> "$GITHUB_OUTPUT"; fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          # all three flow in as quoted env, not expanded into the run: block below
          VERSION_NAME: ${{ steps.ver.outputs.name }}
          PRERELEASE: ${{ steps.ver.outputs.prerelease }}
          HAVE_NOTES: ${{ steps.notes.outputs.have_notes }}
        run: |
          ARGS=()
          [ "$PRERELEASE" = "true" ] && ARGS+=(--prerelease)
          if [ "$HAVE_NOTES" = "true" ]; then
            ARGS+=(--notes-file notes.md)
          else
            ARGS+=(--generate-notes)
          fi
          gh release create "${GITHUB_REF_NAME}" engram.apk engram.apk.sha256 \
            --title "Engram $VERSION_NAME" "${ARGS[@]}"
