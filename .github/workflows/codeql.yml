name: codeql

# Static security analysis (code scanning). Kotlin needs a real compile to
# extract, so we build explicitly (manual mode) like the ci job does; the runner
# already provides the Android SDK.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "27 3 * * 1" # weekly, catches advisories that land after merge

permissions:
  contents: read
  security-events: write

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6
      - uses: github/codeql-action/init@02c5e83432fe5497fd85b873b6c9f16a8578e1d9 # v3
        with:
          languages: java-kotlin
          build-mode: manual
      # tracing needs the Kotlin compiler to actually run in this process:
      # --no-daemon and in-process keep it here, --rerun-tasks defeats up-to-date
      # caching so the compile is not skipped (which leaves nothing to extract)
      - run: >
          ./gradlew :app:assembleDebug :cli:assemble
          --no-daemon --rerun-tasks -Dkotlin.compiler.execution.strategy=in-process --console=plain
      - uses: github/codeql-action/analyze@02c5e83432fe5497fd85b873b6c9f16a8578e1d9 # v3
        with:
          category: "/language:java-kotlin"
