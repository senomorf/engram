name: codeql

# Static security analysis (code scanning). Kotlin/Java is analyzed from source
# with build-mode none, so no Android SDK build is needed in this job.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "27 3 * * 1" # weekly, catches advisories that land after merge

permissions:
  contents: read
  security-events: write

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
      - uses: github/codeql-action/init@v3
        with:
          languages: java-kotlin
          build-mode: none
      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:java-kotlin"
