name: instrumented

# On-device confidence layer (design D22): runs the androidTest suite on a build-managed
# emulator to cover the real platform adapters Kover excludes from the counted number.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: instrumented-${{ github.ref }}
  cancel-in-progress: true

jobs:
  androidTest:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v6
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - run: ./gradlew :app:pixelApi34DebugAndroidTest --console=plain
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: instrumented-results
          path: app/build/reports/androidTests
          if-no-files-found: warn
