name: dependency-submission

# Submit only the SHIPPED runtime dependency graph so Dependabot alerts track what
# actually ships (design D23). This replaces GitHub's Automatic Dependency Submission,
# which also submitted the Android Gradle Plugin build/plugin classpath (netty,
# bouncycastle, logback, jose4j, jdom2, opentelemetry, ...) and minted build-time-only
# alerts. Disable the repo setting "Automatic dependency submission" so this is the sole
# submitter, otherwise the two graphs union and the build-classpath noise returns.
on:
  push:
    branches: [main]

permissions:
  contents: write # submit the dependency snapshot

concurrency:
  group: dependency-submission-${{ github.ref }}
  cancel-in-progress: true

jobs:
  submit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/dependency-submission@v6
        env:
          # Shipped runtime only: the app release runtime and the cli runtime. Excludes the
          # AGP build/plugin classpath (the noise) and all debug/test configurations.
          DEPENDENCY_GRAPH_INCLUDE_CONFIGURATIONS: "^(releaseRuntimeClasspath|runtimeClasspath)$"
