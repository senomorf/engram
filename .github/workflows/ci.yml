name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-kotlin-2.3.21
      # build runs check -> koverVerify (per-module floors); koverVerifyAggregate defends the combined 95% (D22)
      - run: ./gradlew build koverVerifyAggregate :core-format:compileKotlinIosArm64 --console=plain
      - name: coverage html reports
        if: always()
        run: ./gradlew :core-format:koverHtmlReport :cli:koverHtmlReport :app:koverHtmlReportDebug --console=plain
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: coverage-reports
          path: |
            core-format/build/reports/kover/html
            cli/build/reports/kover/html
            app/build/reports/kover/htmlDebug
          if-no-files-found: warn
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: engram-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
