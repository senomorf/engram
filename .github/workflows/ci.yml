name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v6
      - uses: actions/cache@v6
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-kotlin-2.3.21
      # build runs check, which runs koverVerify: the per-module line-coverage floor is enforced here
      - run: ./gradlew build :core-format:compileKotlinIosArm64 --console=plain
      - name: coverage html reports
        if: always()
        run: ./gradlew :core-format:koverHtmlReport :cli:koverHtmlReport :app:koverHtmlReportDebug --console=plain
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-reports
          path: |
            core-format/build/reports/kover/html
            cli/build/reports/kover/html
            app/build/reports/kover/htmlDebug
          if-no-files-found: warn
      - uses: actions/upload-artifact@v7
        with:
          name: engram-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
