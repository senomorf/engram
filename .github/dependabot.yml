version: 2
updates:
  - package-ecosystem: gradle
    directory: /
    schedule:
      interval: weekly
    groups:
      # one PR per ecosystem instead of a swarm; keeps toolchain members together
      androidx:
        patterns: ["androidx.*"]
    ignore:
      # Kotlin toolchain (compiler, KSP, compose plugin) must move together and
      # is upgraded by hand; let only patch bumps through automatically.
      - dependency-name: "org.jetbrains.kotlin*"
        update-types: ["version-update:semver-minor", "version-update:semver-major"]
      - dependency-name: "com.google.devtools.ksp*"
        update-types: ["version-update:semver-minor", "version-update:semver-major"]
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
