name: Bug report
description: Something does not work as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Do not report security issues here. Use the Security tab, "Report a vulnerability".
  - type: textarea
    id: what
    attributes:
      label: What happened
      description: What you did, what you expected, and what actually happened.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps so it can be reproduced.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: App version and device
      description: versionName / versionCode, plus device model and Android version.
    validations:
      required: true
  - type: checkboxes
    id: offline
    attributes:
      label: Offline
      options:
        - label: This also happens with no network (airplane mode)
