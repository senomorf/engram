# Overrides on top of detekt defaults (buildUponDefaultConfig = true).
#
# Division of labor, do not blur it:
# - ktlint owns formatting and layout (via .editorconfig, ktlint_official style)
# - detekt owns code smells, complexity and bug patterns
# detekt's formatting-adjacent rules stay off here to avoid double-reporting.
#
# Byte-format parsing code legitimately uses numeric literals, multiple
# returns and dense branching; thresholds reflect that instead of littering
# sources with suppressions.

complexity:
  LongMethod:
    threshold: 120
  CyclomaticComplexMethod:
    threshold: 25
  NestedBlockDepth:
    threshold: 6
  LongParameterList:
    functionThreshold: 8
    constructorThreshold: 8
    ignoreDefaultParameters: true # test seams with defaults do not bloat a call

empty-blocks:
  EmptyFunctionBlock:
    ignoreOverridden: true # listener interfaces force no-op overrides

exceptions:
  TooGenericExceptionCaught:
    active: false
  SwallowedException:
    active: false

naming:
  FunctionNaming:
    ignoreAnnotated: ["Composable"]

style:
  MagicNumber:
    active: false
  MaxLineLength:
    active: false # ktlint enforces line length from .editorconfig
  ReturnCount:
    max: 8
  ThrowsCount:
    max: 8
